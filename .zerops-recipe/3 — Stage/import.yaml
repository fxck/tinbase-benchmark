#zeropsPreprocessor=on

# Stage — the full three-service stack at single-node scale: managed Postgres, one
# tinbase backend, one dashboard. Durable and subdomain-exposed.

project:
  name: tinbase-benchmark-stage
  corePackage: LIGHT
  envVariables:
    TINBASE_JWT_SECRET: <@generateRandomString(<48>)>

services:
  - hostname: db
    type: postgresql:single@17
    priority: 10
    profile: oltp-staging

  - hostname: tinbase
    type: nodejs@22
    priority: 8
    buildFromGit: https://github.com/fxck/tinbase-zerops
    zeropsSetup: tinbase
    enableSubdomainAccess: true
    minContainers: 1
    maxContainers: 1

  - hostname: dashboard
    type: nodejs@22
    priority: 5
    buildFromGit: https://github.com/fxck/tinbase-benchmark
    zeropsSetup: dashboard
    enableSubdomainAccess: true
    minContainers: 1
    maxContainers: 1
