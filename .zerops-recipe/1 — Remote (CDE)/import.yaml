#zeropsPreprocessor=on

# Remote CDE — the tinbase backend + managed Postgres, plus one dev container for the
# dashboard (zeropsSetup: dashboarddev, idles on `zsc noop`). Connect your IDE / SSH
# to `dashboard` and run `node server.js` against the already-running tinbase.

project:
  name: tinbase-benchmark-cde
  corePackage: LIGHT
  envVariables:
    TINBASE_JWT_SECRET: <@generateRandomString(<48>)>

services:
  - hostname: db
    type: postgresql:single@17
    priority: 10
    profile: oltp-hobby

  - hostname: tinbase
    type: nodejs@22
    priority: 8
    buildFromGit: https://github.com/fxck/tinbase-zerops
    zeropsSetup: tinbase
    enableSubdomainAccess: true
    minContainers: 1
    maxContainers: 1

  - hostname: dashboard
    type: nodejs@22
    priority: 5
    buildFromGit: https://github.com/fxck/tinbase-benchmark
    zeropsSetup: dashboarddev
    enableSubdomainAccess: true
    minContainers: 1
    maxContainers: 1
