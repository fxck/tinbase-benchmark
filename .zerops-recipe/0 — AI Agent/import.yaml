#zeropsPreprocessor=on

# AI Agent — a dev + stage pair for agent-driven development, both backed by one
# managed Postgres. The dev half deploys the whole tree and idles on `zsc noop`
# (zeropsSetup: appdev) so an agent can adopt it and drive `node server.js` via the
# Zerops dev server; the stage half runs the real app (zeropsSetup: app) as a
# running reference. Both share the `db` service and the project TINBASE_JWT_SECRET.

project:
  name: tinbase-benchmark-agent
  corePackage: LIGHT
  envVariables:
    # shared by every app container so they agree on the anon / service_role keys
    TINBASE_JWT_SECRET: <@generateRandomString(<48>)>

services:
  - hostname: db
    type: postgresql:single@17
    priority: 10
    profile: oltp-hobby

  - hostname: appdev
    type: nodejs@22
    priority: 5
    buildFromGit: https://github.com/fxck/tinbase-benchmark
    zeropsSetup: appdev
    enableSubdomainAccess: true
    minContainers: 1
    maxContainers: 1

  - hostname: appstage
    type: nodejs@22
    priority: 5
    buildFromGit: https://github.com/fxck/tinbase-benchmark
    zeropsSetup: app
    enableSubdomainAccess: true
    minContainers: 1
    maxContainers: 1
