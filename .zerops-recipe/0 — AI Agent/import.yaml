#zeropsPreprocessor=on

# AI Agent — the tinbase backend + a managed Postgres, plus a dev/stage pair of the
# benchmark dashboard for agent-driven development. tinbase runs as a stable service
# (it's the product, not what you edit); the agent adopts the dashboarddev container
# (idles on `zsc noop`) and drives it via the Zerops dev server, with dashboardstage
# as a running reference.

project:
  name: tinbase-benchmark-agent
  corePackage: LIGHT
  envVariables:
    # shared signing secret: tinbase signs the keys, the dashboards mint matching ones
    TINBASE_JWT_SECRET: <@generateRandomString(<48>)>

services:
  - hostname: db
    type: postgresql:single@17
    priority: 10
    profile: oltp-hobby

  - hostname: tinbase
    type: nodejs@22
    priority: 8
    buildFromGit: https://github.com/fxck/tinbase-zerops
    zeropsSetup: tinbase
    enableSubdomainAccess: true
    minContainers: 1
    maxContainers: 1

  - hostname: dashboarddev
    type: nodejs@22
    priority: 5
    buildFromGit: https://github.com/fxck/tinbase-benchmark
    zeropsSetup: dashboarddev
    enableSubdomainAccess: true
    minContainers: 1
    maxContainers: 1

  - hostname: dashboardstage
    type: nodejs@22
    priority: 5
    buildFromGit: https://github.com/fxck/tinbase-benchmark
    zeropsSetup: dashboard
    enableSubdomainAccess: true
    minContainers: 1
    maxContainers: 1
