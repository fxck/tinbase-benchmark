#zeropsPreprocessor=on

# Small Production — the three-service stack on a SERIOUS core: one tinbase and one
# dashboard container, each vertically autoscaled, plus a single-node managed
# Postgres. For horizontal scale + a resilient database use the HA Production tier.

project:
  name: tinbase-benchmark-prod
  corePackage: SERIOUS
  envVariables:
    TINBASE_JWT_SECRET: <@generateRandomString(<48>)>

services:
  - hostname: db
    type: postgresql:single@17
    priority: 10
    profile: oltp-staging

  - hostname: tinbase
    type: nodejs@22
    priority: 8
    buildFromGit: https://github.com/fxck/tinbase-zerops
    zeropsSetup: tinbase
    enableSubdomainAccess: true
    minContainers: 1
    maxContainers: 1
    verticalAutoscaling:
      minRam: 1
      maxRam: 16

  - hostname: dashboard
    type: nodejs@22
    priority: 5
    buildFromGit: https://github.com/fxck/tinbase-benchmark
    zeropsSetup: dashboard
    enableSubdomainAccess: true
    minContainers: 1
    maxContainers: 1
    verticalAutoscaling:
      minRam: 1
      maxRam: 8
