#zeropsPreprocessor=on

# Small Production — a single strong app container on a SERIOUS core with a public
# subdomain, plus a single-node managed Postgres. The app scales vertically here;
# for horizontal scale + a resilient database use the HA Production tier.

project:
  name: tinbase-benchmark-prod
  corePackage: SERIOUS
  envVariables:
    TINBASE_JWT_SECRET: <@generateRandomString(<48>)>

services:
  - hostname: db
    type: postgresql:single@17
    priority: 10
    profile: oltp-staging

  - hostname: app
    type: nodejs@22
    priority: 5
    buildFromGit: https://github.com/fxck/tinbase-benchmark
    zeropsSetup: app
    enableSubdomainAccess: true
    minContainers: 1
    maxContainers: 1
    verticalAutoscaling:
      minRam: 1
      maxRam: 16
      minCpu: 1
      maxCpu: 8
