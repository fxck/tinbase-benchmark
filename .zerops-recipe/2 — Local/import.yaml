#zeropsPreprocessor=on

# Local — the managed database only. Run BOTH the tinbase backend and the dashboard
# on your own machine against it over the Zerops VPN (`zcli vpn up`): start tinbase
# with DATABASE_URL pointed at db's superuser connection, then run the dashboard
# with TINBASE_INTERNAL_URL=http://localhost:54321.

project:
  name: tinbase-benchmark-local
  corePackage: LIGHT
  envVariables:
    TINBASE_JWT_SECRET: <@generateRandomString(<48>)>

services:
  - hostname: db
    type: postgresql:single@17
    priority: 10
    profile: oltp-hobby
