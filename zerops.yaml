zerops:
  - setup: app
    build:
      base: nodejs@22
      buildCommands:
        - npm install
      deployFiles:
        - .
      cache:
        - node_modules
    run:
      base: nodejs@22
      ports:
        - port: 3000
          httpSupport: true
      envVariables:
        NODE_ENV: production
      start: node server.js
