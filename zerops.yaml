zerops:
  # The benchmark dashboard — a pure client of the `tinbase` service. It does not
  # touch the database directly; it talks to tinbase over the internal network and
  # (in the browser) at tinbase's public subdomain.
  - setup: dashboard
    build:
      base: nodejs@22
      buildCommands:
        - npm install
      deployFiles:
        - .
      cache:
        - node_modules
    run:
      base: nodejs@22
      ports:
        - port: 3000
          httpSupport: true
      envVariables:
        NODE_ENV: production
        # internal DNS to the tinbase service (server-side benchmark)
        TINBASE_INTERNAL_URL: http://tinbase:3000
        # tinbase's public URL (browser-side supabase-js demo + Studio link)
        TINBASE_PUBLIC_URL: ${tinbase_zeropsSubdomain}
      start: node server.js
      healthCheck:
        httpGet:
          port: 3000
          path: /health

  # Dev setup — idles on `zsc noop` for agent / IDE adoption (AI Agent, Remote CDE).
  - setup: dashboarddev
    build:
      base: nodejs@22
      buildCommands:
        - npm install
      deployFiles:
        - .
      cache:
        - node_modules
    run:
      base: nodejs@22
      ports:
        - port: 3000
          httpSupport: true
      envVariables:
        NODE_ENV: development
        TINBASE_INTERNAL_URL: http://tinbase:3000
        TINBASE_PUBLIC_URL: ${tinbase_zeropsSubdomain}
      start: zsc noop --silent
